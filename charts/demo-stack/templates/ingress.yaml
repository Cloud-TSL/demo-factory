apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "demo-stack.name" . }}
  labels:
    {{- include "demo-stack.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.ingress.maxBodySize | quote }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ include "demo-stack.host" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
