apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  labels:
    {{- include "demo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  config.js: |
    window.__DEMO_CONFIG__ = {
      slug: {{ .Values.slug | quote }},
      primaryColor: {{ .Values.branding.primaryColor | default "" | quote }},
      logoUrl: {{ .Values.branding.logoUrl | default "" | quote }},
      brandTitle: {{ .Values.branding.brandTitle | default "" | quote }},
    };
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    {{- include "demo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "demo-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      annotations:
        checksum/branding: {{ printf "%s-%s-%s" (.Values.branding.primaryColor | default "") (.Values.branding.logoUrl | default "") (.Values.branding.brandTitle | default "") | sha256sum }}
      labels:
        {{- include "demo-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: {{ (index .Values.tiers .Values.tier).frontend.requests.cpu }}
              memory: {{ (index .Values.tiers .Values.tier).frontend.requests.memory }}
            limits:
              cpu: {{ (index .Values.tiers .Values.tier).frontend.limits.cpu }}
              memory: {{ (index .Values.tiers .Values.tier).frontend.limits.memory }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
          volumeMounts:
            - name: frontend-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
              readOnly: true
      volumes:
        - name: frontend-config
          configMap:
            name: frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "demo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    {{- include "demo-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
